version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: casebased2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - casebased2_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO Object Storage ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: casebased2_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API MinIO
      - "9001:9001"   # Dashboard MinIO
    networks:
      - casebased2_net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Web App (Node.js + Express) ──────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: casebased2_app
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    ports:
      - "3000:3000"
    networks:
      - casebased2_net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

# ─── Volumes ──────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

# ─── Network ──────────────────────────────────────────────
networks:
  casebased2_net:
    driver: bridge
